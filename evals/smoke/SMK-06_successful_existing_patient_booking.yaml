id: SMK-06
title: Successful existing-patient booking
priority: P1
category: booking
needs_fresh_uin: false
mutates_database: true

goal: >
  Verify that a returning patient can be identified, routed into a routine
  new-concern booking flow, triaged, shown slots, and successfully booked
  without entering registration.

seed_dependencies:
  patients:
    - Bob Martinez / 234567890
  specialties:
    - Gastroenterology
  doctors:
    - Dr. Robert Kim

user_script:
  - speaker: user
    text: I'd like to make an appointment.
  - speaker: user
    text: I've been there before.
  - speaker: user
    text: My UIN is two three four five six seven eight nine zero.
  - speaker: user
    text: Yes.
  - speaker: user
    text: Yes.
  - speaker: user
    text: This is for a new concern.
  - speaker: user
    text: I've been having stomach pain and nausea on and off for a few days.
  - speaker: user
    text: No specialist preference.
  - speaker: user
    text: That sounds right.
  - speaker: user
    text: Next week.
  - speaker: user
    text: Afternoon.
  - speaker: user
    text: The first option works.

expected_tool_path:
  - tool: identify_patient
    expect_status:
      - FOUND
    args_match:
      uin: "234567890"
  - tool: triage
    expect_status:
      - SPECIALTY_FOUND
    args_should_include:
      symptoms:
        - stomach pain
        - nausea
  - tool: find_slots
    expect_status:
      - OK
    args_exact_count: 3
    args_required:
      - specialty_id
      - preferred_day
      - preferred_time
    args_match:
      specialty_id: a0000000-0000-0000-0000-000000000006
      preferred_day: next week
      preferred_time: afternoon
  - tool: book
    expect_status:
      - CONFIRMED
    args_exact_count: 6
    vapi_dashboard_note: >
      Do not exact-match the symptoms value in Vapi expected-tool-call rows.
      Use an LLM-as-a-judge checkpoint to verify that symptoms are present and
      related to the caller's stomach-pain/nausea concern.
    args_required:
      - patient_id
      - doctor_id
      - start_at
      - end_at
      - specialty_id
      - symptoms
    args_match:
      specialty_id: a0000000-0000-0000-0000-000000000006
    args_should_include:
      symptoms:
        - stomach pain
        - nausea

must_do:
  - Ask for the UIN once the caller says they have been there before.
  - Confirm the identified patient before continuing.
  - Ask whether the visit is for a follow-up or a new concern.
  - Continue into symptom collection and booking without suggesting registration.
  - Confirm the final appointment in spoken date-and-time format.

must_not_do:
  - Call register_patient in this flow.
  - Ask whether the returning patient is a new patient after identification.
  - Ask the patient to describe symptoms again after they already gave a symptom description.
  - Ask for a severity rating before triage.
  - Skip patient identification and go straight to triage or slots.

failure_signals:
  - identify_patient is never called.
  - register_patient appears anywhere in the run.
  - The assistant books before confirming identity.
