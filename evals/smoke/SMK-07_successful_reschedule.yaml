id: SMK-07
title: Successful reschedule for an existing appointment
priority: P1
category: reschedule
needs_fresh_uin: false
mutates_database: true

goal: >
  Verify that the assistant identifies the patient, finds the correct existing
  appointment, asks for new preferences, and completes rescheduling with
  reschedule_finalize rather than separate booking and cancellation steps.

seed_dependencies:
  patients:
    - Nina Carter / 678901235
  doctors:
    - Dr. Lisa Martinez
  appointments:
    - d0000000-0000-0000-0000-000000000005 / Ear pain follow-up

user_script:
  - speaker: user
    text: I need to reschedule my appointment.
  - speaker: user
    text: My UIN is six seven eight nine zero one two three five.
  - speaker: user
    text: Yes.
  - speaker: user
    text: It's the ear pain follow-up with Dr. Lisa Martinez.
  - speaker: user
    text: It was next Tuesday morning.
  - speaker: user
    text: Yes.
  - speaker: user
    text: Next week.
  - speaker: user
    text: Afternoon.
  - speaker: user
    text: The first new time works for me.

expected_tool_path:
  - tool: identify_patient
    expect_status:
      - FOUND
    args_match:
      uin: "678901235"
  - tool: find_appointment
    expect_status:
      - FOUND
    args_match:
      patient_id: c0000000-0000-0000-0000-000000000006
    args_should_include:
      doctor_name:
        - Lisa Martinez
      reason:
        - ear pain
  - tool: reschedule
    expect_status:
      - SLOTS_AVAILABLE
    args_match:
      appointment_id: d0000000-0000-0000-0000-000000000005
      patient_id: c0000000-0000-0000-0000-000000000006
      preferred_day: next week
      preferred_time: afternoon
  - tool: reschedule_finalize
    expect_status:
      - RESCHEDULED
    args_required:
      - original_appointment_id
      - patient_id
      - doctor_id
      - start_at
      - end_at

must_do:
  - Ask for the UIN immediately after the caller says they want to reschedule.
  - Confirm the identified patient before continuing.
  - Confirm the matched appointment before offering new times.
  - Ask for preferred day and preferred time before calling reschedule.
  - Confirm that the new appointment is booked and the old one is cancelled.

must_not_do:
  - Ask whether the caller is new or returning before identification.
  - Ask for more than one extra appointment detail after the caller gives both the doctor and reason.
  - Call book and cancel separately for this reschedule.
  - Cancel the original appointment before the patient confirms a new slot.

failure_signals:
  - identify_patient is skipped.
  - The assistant keeps asking for appointment details after the caller gives a rough timing answer.
  - reschedule_finalize is never called after slot selection.
  - book or cancel is used instead of reschedule_finalize.
